<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Updates & Portfolio | Advocacy for the Unhoused</title>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Montserrat:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #C8522D;
      --cream:  #F9F6F0;
      --dark:   #1A1311;
      --white:  #ffffff;
      --muted:  #7a6a62;
      --border: #e0d8d0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--dark);
      color: var(--dark);
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      background: var(--cream);
      padding: 72px 8% 64px;
      border-bottom: 4px solid var(--dark);
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: 'UPDATES';
      position: absolute;
      right: -20px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      font-family: 'Abril Fatface', serif;
      font-size: 7rem;
      color: rgba(0,0,0,0.04);
      white-space: nowrap;
      pointer-events: none;
      letter-spacing: -2px;
    }
    .hero-eyebrow {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 16px;
    }
    .hero h1 {
      font-family: 'Abril Fatface', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 0.95;
      color: var(--dark);
      margin-bottom: 20px;
    }
    .hero h1 span { color: var(--orange); font-style: italic; }
    .hero-sub {
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 520px;
      line-height: 1.8;
    }

    /* ── TABS ── */
    .tabs-bar {
      background: var(--cream);
      border-bottom: 4px solid var(--dark);
      display: flex;
      gap: 0;
      padding: 0 8%;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .tab-btn {
      font-family: 'Abril Fatface', serif;
      font-size: 1rem;
      padding: 18px 28px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 4px solid transparent;
      margin-bottom: -4px;
      transition: color 0.2s, border-color 0.2s;
      letter-spacing: 0.5px;
    }
    .tab-btn.active {
      color: var(--dark);
      border-bottom-color: var(--orange);
    }
    .tab-btn:hover { color: var(--dark); }

    /* ── MAIN LAYOUT ── */
    .page-body {
      background: var(--cream);
      min-height: 80vh;
      padding: 56px 8% 80px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── SECTION HEADER ── */
    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--dark);
      flex-wrap: wrap;
      gap: 16px;
    }
    .section-head h2 {
      font-family: 'Abril Fatface', serif;
      font-size: 2.2rem;
      line-height: 1;
    }

    /* ── ADD BUTTON ── */
    .add-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--dark);
      color: var(--cream);
      border: none;
      padding: 12px 22px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .add-btn:hover {
      background: var(--orange);
      box-shadow: 4px 4px 0 var(--dark);
      transform: translate(-2px, -2px);
    }

    /* ── BLOG GRID ── */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .blog-card {
      background: var(--white);
      border: 3px solid var(--dark);
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      position: relative;
    }
    .blog-card:hover {
      transform: translate(-4px, -4px);
      box-shadow: 8px 8px 0 var(--orange);
    }
    .blog-card-tag {
      display: inline-block;
      background: var(--orange);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 12px;
    }
    .blog-card-body { padding: 20px 24px 24px; }
    .blog-card-date {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .blog-card-title {
      font-family: 'Abril Fatface', serif;
      font-size: 1.4rem;
      line-height: 1.1;
      color: var(--dark);
      margin-bottom: 12px;
    }
    .blog-card-excerpt {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.7;
    }
    .blog-card-footer {
      padding: 14px 24px;
      border-top: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .blog-card-author {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--dark);
    }
    .read-more {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--orange);
    }
    .blog-card-delete {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--dark);
      color: var(--cream);
      border: none;
      width: 26px;
      height: 26px;
      font-size: 0.75rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .blog-card:hover .blog-card-delete { display: flex; }
    .blog-card-delete:hover { background: var(--orange); }

    /* ── PORTFOLIO GRID ── */
    .portfolio-upcoming {
      margin-bottom: 48px;
    }
    .subsection-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 16px;
    }
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .project-card {
      background: var(--white);
      border: 3px solid var(--dark);
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .project-card:hover {
      transform: translate(-3px, -3px);
      box-shadow: 6px 6px 0 var(--orange);
    }
    .project-card.upcoming {
      border-color: var(--orange);
      background: var(--cream);
    }
    .project-card-head {
      background: var(--dark);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .project-card.upcoming .project-card-head {
      background: var(--orange);
    }
    .project-status {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }
    .project-date-badge {
      font-family: 'Abril Fatface', serif;
      font-size: 0.85rem;
      color: white;
    }
    .project-card-body { padding: 20px; }
    .project-name {
      font-family: 'Abril Fatface', serif;
      font-size: 1.3rem;
      color: var(--dark);
      margin-bottom: 8px;
    }
    .project-raised {
      display: inline-block;
      font-family: 'Abril Fatface', serif;
      font-size: 1.8rem;
      color: var(--orange);
      line-height: 1;
      margin-bottom: 10px;
    }
    .project-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.7;
    }
    .project-card-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255,255,255,0.15);
      color: white;
      border: none;
      width: 22px;
      height: 22px;
      font-size: 0.7rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .project-card:hover .project-card-delete { display: flex; }
    .project-card-delete:hover { background: rgba(255,255,255,0.3); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,19,17,0.75);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--cream);
      border: 4px solid var(--dark);
      box-shadow: 12px 12px 0 var(--orange);
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(20px);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-head {
      background: var(--dark);
      padding: 24px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title {
      font-family: 'Abril Fatface', serif;
      font-size: 1.4rem;
      color: var(--cream);
    }
    .modal-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--orange); }
    .modal-body { padding: 28px; }

    /* ── FORM FIELDS ── */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dark);
      margin-bottom: 7px;
    }
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 12px 14px;
      border: 3px solid var(--dark);
      background: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.92rem;
      color: var(--dark);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      border-radius: 0;
      appearance: none;
    }
    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--orange);
      box-shadow: 4px 4px 0 var(--orange);
    }
    .field textarea { min-height: 120px; resize: vertical; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .modal-submit {
      width: 100%;
      background: var(--dark);
      color: var(--cream);
      border: none;
      padding: 16px;
      font-family: 'Abril Fatface', serif;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.15s;
    }
    .modal-submit:hover {
      background: var(--orange);
      box-shadow: 4px 4px 0 var(--dark);
    }

    /* ── FULL POST VIEW ── */
    .post-view { display: none; }
    .post-view.active { display: block; }
    .post-view-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--orange);
      cursor: pointer;
      margin-bottom: 32px;
      padding: 0;
    }
    .post-view-back:hover { text-decoration: underline; }
    .post-view-tag {
      display: inline-block;
      background: var(--orange);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 12px;
      margin-bottom: 16px;
    }
    .post-view-date {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .post-view-title {
      font-family: 'Abril Fatface', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1;
      color: var(--dark);
      margin-bottom: 16px;
      max-width: 700px;
    }
    .post-view-author {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 40px;
      padding-bottom: 32px;
      border-bottom: 2px solid var(--dark);
    }
    .post-view-body {
      font-size: 1rem;
      line-height: 1.9;
      color: var(--dark);
      max-width: 680px;
      white-space: pre-wrap;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state p { font-size: 0.9rem; line-height: 1.7; }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 0;
      margin-bottom: 40px;
      border: 3px solid var(--dark);
      overflow: hidden;
    }
    .stat-item {
      flex: 1;
      padding: 20px 24px;
      border-right: 3px solid var(--dark);
      background: var(--white);
    }
    .stat-item:last-child { border-right: none; }
    .stat-val {
      font-family: 'Abril Fatface', serif;
      font-size: 2rem;
      color: var(--orange);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    @media (max-width: 600px) {
      .hero { padding: 48px 6% 40px; }
      .page-body { padding: 36px 6% 60px; }
      .tabs-bar { padding: 0 6%; }
      .tab-btn { padding: 14px 16px; font-size: 0.85rem; }
      .field-row { grid-template-columns: 1fr; }
      .stats-bar { flex-direction: column; }
      .stat-item { border-right: none; border-bottom: 3px solid var(--dark); }
      .stat-item:last-child { border-bottom: none; }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-eyebrow">Advocacy · Awareness · Action</div>
    <h1>Our Work &<br><span>Updates</span></h1>
    <p class="hero-sub">Follow our latest blog posts, fundraisers, events, and community impact — all in one place.</p>
  </div>

  <!-- TABS -->
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('blog', this)">Blog</button>
    <button class="tab-btn" onclick="switchTab('portfolio', this)">Project Portfolio</button>
  </div>

  <!-- PAGE BODY -->
  <div class="page-body">

    <!-- ── BLOG TAB ── -->
    <div id="tab-blog" class="tab-panel active">

      <!-- List view -->
      <div id="blog-list-view">
        <div class="section-head">
          <h2>Latest Posts</h2>
          <button class="add-btn" onclick="openModal('blog')">+ New Post</button>
        </div>
        <div class="blog-grid" id="blog-grid"></div>
      </div>

      <!-- Full post view -->
      <div class="post-view" id="post-full-view">
        <button class="post-view-back" onclick="closePost()">← Back to all posts</button>
        <div class="post-view-tag" id="pv-tag"></div>
        <div class="post-view-date" id="pv-date"></div>
        <h1 class="post-view-title" id="pv-title"></h1>
        <div class="post-view-author" id="pv-author"></div>
        <div class="post-view-body" id="pv-body"></div>
      </div>

    </div>

    <!-- ── PORTFOLIO TAB ── -->
    <div id="tab-portfolio" class="tab-panel">
      <div class="section-head">
        <h2>Project Portfolio</h2>
        <button class="add-btn" onclick="openModal('project')">+ New Project</button>
      </div>

      <!-- Stats -->
      <div class="stats-bar" id="stats-bar">
        <div class="stat-item"><div class="stat-val" id="stat-total">$0</div><div class="stat-label">Total Raised</div></div>
        <div class="stat-item"><div class="stat-val" id="stat-events">0</div><div class="stat-label">Events</div></div>
        <div class="stat-item"><div class="stat-val" id="stat-upcoming">0</div><div class="stat-label">Upcoming</div></div>
      </div>

      <div class="portfolio-upcoming" id="upcoming-section" style="display:none;">
        <div class="subsection-label">Upcoming</div>
        <div class="portfolio-grid" id="upcoming-grid"></div>
      </div>

      <div>
        <div class="subsection-label">Past Events</div>
        <div class="portfolio-grid" id="past-grid"></div>
      </div>
    </div>

  </div>

  <!-- ── BLOG MODAL ── -->
  <div class="modal-overlay" id="modal-blog">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">New Blog Post</div>
        <button class="modal-close" onclick="closeModal('blog')">✕</button>
      </div>
      <div class="modal-body">
        <div class="field-row">
          <div class="field">
            <label>Title *</label>
            <input type="text" id="b-title" placeholder="Post title" />
          </div>
          <div class="field">
            <label>Category</label>
            <select id="b-tag">
              <option>Update</option>
              <option>Event Recap</option>
              <option>Fundraiser</option>
              <option>Community</option>
              <option>Announcement</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Author</label>
            <input type="text" id="b-author" placeholder="Your name" />
          </div>
          <div class="field">
            <label>Date</label>
            <input type="date" id="b-date" />
          </div>
        </div>
        <div class="field">
          <label>Excerpt (shown on card)</label>
          <input type="text" id="b-excerpt" placeholder="One-sentence summary..." />
        </div>
        <div class="field">
          <label>Full Post Content *</label>
          <textarea id="b-body" placeholder="Write your full post here..."></textarea>
        </div>
        <button class="modal-submit" onclick="saveBlogPost()">Publish Post</button>
      </div>
    </div>
  </div>

  <!-- ── PROJECT MODAL ── -->
  <div class="modal-overlay" id="modal-project">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">New Project / Event</div>
        <button class="modal-close" onclick="closeModal('project')">✕</button>
      </div>
      <div class="modal-body">
        <div class="field-row">
          <div class="field">
            <label>Event Name *</label>
            <input type="text" id="p-name" placeholder="e.g. Spring Bake Sale" />
          </div>
          <div class="field">
            <label>Status</label>
            <select id="p-status">
              <option value="past">Past Event</option>
              <option value="upcoming">Upcoming</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Date</label>
            <input type="text" id="p-date" placeholder="e.g. 10/17/25" />
          </div>
          <div class="field">
            <label>Amount Raised ($)</label>
            <input type="number" id="p-raised" placeholder="e.g. 214" min="0" />
          </div>
        </div>
        <div class="field">
          <label>Description *</label>
          <textarea id="p-desc" placeholder="Describe the event..."></textarea>
        </div>
        <button class="modal-submit" onclick="saveProject()">Save Project</button>
      </div>
    </div>
  </div>

  <script>
    // ── DEFAULT DATA ──
    const DEFAULT_POSTS = [];

    const DEFAULT_PROJECTS = [
      {
        id: 'proj-1', name: '5k Fundraiser', status: 'upcoming',
        date: 'Coming Soon', raised: null,
        desc: 'Stay tuned for details on our upcoming 5k fundraiser run.'
      },
      {
        id: 'proj-2', name: 'SAAG Fundraiser', status: 'past',
        date: '10/10/25', raised: 46,
        desc: 'The HAU team participated in the SAAG Clothing Fundraiser, selling candles and earrings at the garba. Through the fundraiser, we raised $46 to support the unhoused. Overall, this event was a successful opportunity to raise funds and build support for our mission.'
      },
      {
        id: 'proj-3', name: '3k Fundraiser', status: 'past',
        date: '10/17/25', raised: 56,
        desc: 'HAU hosted a community 3k run to raise funds and awareness for unhoused individuals. Participants finished the route at a small stand where volunteers sold food and treats. The event raised $56, contributing directly to our proceeds for the unhoused.'
      },
      {
        id: 'proj-4', name: 'Candle Fundraiser', status: 'past',
        date: '', raised: 469,
        desc: 'Sold candles door to door around North and South Legacy Farms.'
      },
      {
        id: 'proj-5', name: 'Earring Fundraiser', status: 'past',
        date: '', raised: 386,
        desc: 'Sold earrings door to door throughout the neighborhood, raising $386.'
      },
      {
        id: 'proj-6', name: 'Bake Sale', status: 'past',
        date: '11/24–25/2025', raised: 214,
        desc: 'HAU held a bake sale to support advocacy for the unhoused. Club members went door-to-door selling handmade candles throughout the neighborhood and later hosted both a candle and baked-goods sale after school on Monday and Tuesday. The effort raised a total of $214, making it one of our most successful fundraisers of the year.'
      }
    ];

    // ── STORAGE ──
    async function loadData(key, fallback) {
      try {
        const result = await window.storage.get(key);
        return result ? JSON.parse(result.value) : fallback;
      } catch { return fallback; }
    }

    async function saveData(key, value) {
      try {
        await window.storage.set(key, JSON.stringify(value));
      } catch(e) { console.error('Storage error', e); }
    }

    let blogPosts = [];
    let projects = [];

    async function init() {
      blogPosts = await loadData('hau:blog-posts', DEFAULT_POSTS);
      projects  = await loadData('hau:projects', DEFAULT_PROJECTS);
      renderBlog();
      renderPortfolio();
    }

    // ── TABS ──
    function switchTab(name, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      btn.classList.add('active');
      closePost();
    }

    // ── BLOG RENDER ──
    function renderBlog() {
      const grid = document.getElementById('blog-grid');
      if (!blogPosts.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">✍️</div>
          <p>No posts yet.<br>Hit <strong>+ New Post</strong> to publish your first update.</p>
        </div>`;
        return;
      }
      const sorted = [...blogPosts].sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
      grid.innerHTML = sorted.map(p => `
        <div class="blog-card" onclick="openPost('${p.id}')">
          <button class="blog-card-delete" onclick="event.stopPropagation(); deletePost('${p.id}')">✕</button>
          <div class="blog-card-tag">${p.tag}</div>
          <div class="blog-card-body">
            <div class="blog-card-date">${formatDate(p.date)}</div>
            <div class="blog-card-title">${p.title}</div>
            <div class="blog-card-excerpt">${p.excerpt || p.body.substring(0,120) + '…'}</div>
          </div>
          <div class="blog-card-footer">
            <span class="blog-card-author">By ${p.author || 'HAU Team'}</span>
            <span class="read-more">Read More →</span>
          </div>
        </div>`).join('');
    }

    function openPost(id) {
      const p = blogPosts.find(x => x.id === id);
      if (!p) return;
      document.getElementById('blog-list-view').style.display = 'none';
      const pv = document.getElementById('post-full-view');
      pv.classList.add('active');
      document.getElementById('pv-tag').textContent = p.tag;
      document.getElementById('pv-date').textContent = formatDate(p.date);
      document.getElementById('pv-title').textContent = p.title;
      document.getElementById('pv-author').textContent = 'By ' + (p.author || 'HAU Team');
      document.getElementById('pv-body').textContent = p.body;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function closePost() {
      document.getElementById('blog-list-view').style.display = '';
      document.getElementById('post-full-view').classList.remove('active');
    }

    function deletePost(id) {
      if (!confirm('Delete this post?')) return;
      blogPosts = blogPosts.filter(p => p.id !== id);
      saveData('hau:blog-posts', blogPosts);
      renderBlog();
    }

    // ── PORTFOLIO RENDER ──
    function renderPortfolio() {
      const upcoming = projects.filter(p => p.status === 'upcoming');
      const past     = projects.filter(p => p.status === 'past');

      const upcomingSection = document.getElementById('upcoming-section');
      upcomingSection.style.display = upcoming.length ? '' : 'none';
      document.getElementById('upcoming-grid').innerHTML = upcoming.map(projectCard).join('');
      document.getElementById('past-grid').innerHTML = past.length
        ? past.map(projectCard).join('')
        : `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📋</div><p>No past events yet.</p></div>`;

      // Stats
      const totalRaised = projects.reduce((sum, p) => sum + (p.raised || 0), 0);
      document.getElementById('stat-total').textContent = '$' + totalRaised.toLocaleString();
      document.getElementById('stat-events').textContent = past.length;
      document.getElementById('stat-upcoming').textContent = upcoming.length;
    }

    function projectCard(p) {
      return `<div class="project-card ${p.status}">
        <button class="project-card-delete" onclick="deleteProject('${p.id}')">✕</button>
        <div class="project-card-head">
          <span class="project-status">${p.status === 'upcoming' ? '⬆ Upcoming' : '✓ Completed'}</span>
          ${p.date ? `<span class="project-date-badge">${p.date}</span>` : ''}
        </div>
        <div class="project-card-body">
          <div class="project-name">${p.name}</div>
          ${p.raised ? `<div class="project-raised">$${p.raised.toLocaleString()}</div>` : ''}
          <div class="project-desc">${p.desc}</div>
        </div>
      </div>`;
    }

    function deleteProject(id) {
      if (!confirm('Delete this project?')) return;
      projects = projects.filter(p => p.id !== id);
      saveData('hau:projects', projects);
      renderPortfolio();
    }

    // ── MODALS ──
    function openModal(type) {
      document.getElementById('modal-' + type).classList.add('open');
      if (type === 'blog') document.getElementById('b-date').value = new Date().toISOString().split('T')[0];
    }
    function closeModal(type) {
      document.getElementById('modal-' + type).classList.remove('open');
    }
    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
    });

    // ── SAVE BLOG ──
    function saveBlogPost() {
      const title = document.getElementById('b-title').value.trim();
      const body  = document.getElementById('b-body').value.trim();
      if (!title || !body) { alert('Title and content are required.'); return; }
      const post = {
        id: 'post-' + Date.now(),
        title,
        tag:     document.getElementById('b-tag').value,
        author:  document.getElementById('b-author').value.trim() || 'HAU Team',
        date:    document.getElementById('b-date').value,
        excerpt: document.getElementById('b-excerpt').value.trim(),
        body
      };
      blogPosts.unshift(post);
      saveData('hau:blog-posts', blogPosts);
      renderBlog();
      closeModal('blog');
      ['b-title','b-author','b-date','b-excerpt','b-body'].forEach(id => document.getElementById(id).value = '');
    }

    // ── SAVE PROJECT ──
    function saveProject() {
      const name = document.getElementById('p-name').value.trim();
      const desc = document.getElementById('p-desc').value.trim();
      if (!name || !desc) { alert('Name and description are required.'); return; }
      const raised = parseFloat(document.getElementById('p-raised').value);
      const proj = {
        id:     'proj-' + Date.now(),
        name,
        status: document.getElementById('p-status').value,
        date:   document.getElementById('p-date').value.trim(),
        raised: isNaN(raised) ? null : raised,
        desc
      };
      projects.unshift(proj);
      saveData('hau:projects', projects);
      renderPortfolio();
      closeModal('project');
      ['p-name','p-date','p-raised','p-desc'].forEach(id => document.getElementById(id).value = '');
    }

    // ── UTILS ──
    function formatDate(d) {
      if (!d) return '';
      const dt = new Date(d + 'T12:00:00');
      if (isNaN(dt)) return d;
      return dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    init();
  </script>
</body>
</html>
